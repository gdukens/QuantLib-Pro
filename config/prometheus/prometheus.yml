global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: quantlib-pro
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics
    scheme: http

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: postgres
    static_configs:
      - targets: ["db:5432"]
